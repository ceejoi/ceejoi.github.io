<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartLink Terminal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="terminal">

    <div id="terminalText"></div>

    <div id="messageSection" class="hidden">

        <textarea
            id="messageInput"
            maxlength="100"
            placeholder="Type your message here..."
        ></textarea>

        <button id="sendBtn">
            TRANSMIT
        </button>

    </div>

</div>

<script src="script.js"></script>
    
<div id="petContainer"></div>
    
</body>
</html>
